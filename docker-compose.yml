version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: complianceos
      POSTGRES_PASSWORD: complianceos
      POSTGRES_DB: complianceos_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complianceos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://complianceos:complianceos@postgres:5432/complianceos_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: local-dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  projector:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://complianceos:complianceos@postgres:5432/complianceos_dev
      PROJECTOR_PORT: "3100"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
