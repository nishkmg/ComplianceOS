<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - ComplianceOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Syne:wght@400..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#fff8f4",
                        "surface-container-low": "#fff1e4",
                        "on-background": "#211b13",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "amber-text": "#B47500",
                        "inverse-primary": "#ffb950",
                        "text-light": "#888888",
                        "primary-fixed-dim": "#ffb950",
                        "section-amber": "rgba(200, 134, 10, 0.06)",
                        "tertiary": "#006494",
                        "outline": "#847563",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-secondary-fixed-variant": "#474746",
                        "section-dark": "#111111",
                        "on-surface": "#211b13",
                        "surface-tint": "#825500",
                        "on-tertiary": "#ffffff",
                        "secondary": "#5f5e5e",
                        "on-primary-fixed-variant": "#633f00",
                        "tertiary-fixed-dim": "#8ecdff",
                        "secondary-container": "#e2dfde",
                        "page-bg": "#FAFAF8",
                        "text-mid": "#555555",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#cae6ff",
                        "outline-variant": "#d6c4af",
                        "on-secondary": "#ffffff",
                        "border-subtle": "#E8E4DC",
                        "secondary-fixed": "#e5e2e1",
                        "section-muted": "#F4F2EE",
                        "primary-fixed": "#ffddb3",
                        "on-tertiary-fixed": "#001e30",
                        "inverse-surface": "#362f27",
                        "on-secondary-container": "#636262",
                        "on-error": "#ffffff",
                        "surface-dim": "#e5d8cb",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container": "#f9ecde",
                        "primary": "#825500",
                        "on-primary-fixed": "#291800",
                        "on-tertiary-fixed-variant": "#004b70",
                        "on-primary-container": "#3f2700",
                        "inverse-on-surface": "#fcefe1",
                        "on-surface-variant": "#514535",
                        "surface-container-high": "#f3e6d9",
                        "surface-bright": "#fff8f4",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#ede0d3",
                        "primary-container": "#c8860a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#002f49",
                        "tertiary-container": "#309bdb",
                        "background": "#fff8f4",
                        "surface-variant": "#ede0d3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "space-64": "64px",
                        "space-48": "48px",
                        "gutter-desktop": "24px",
                        "gutter-wide": "32px",
                        "space-96": "96px",
                        "space-128": "128px"
                    },
                    "fontFamily": {
                        "display-lg": ["Playfair Display"],
                        "ui-lg": ["Syne"],
                        "ui-xs": ["Syne"],
                        "ui-sm": ["Syne"],
                        "mono-lg": ["DM Mono"],
                        "mono-md": ["DM Mono"],
                        "marketing-xl": ["Playfair Display"],
                        "display-xl": ["Playfair Display"],
                        "marketing-hero": ["Playfair Display"],
                        "ui-md": ["Syne"]
                    },
                    "fontSize": {
                        "display-lg": ["26px", {"lineHeight": "1.3", "fontWeight": "400"}],
                        "ui-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "500"}],
                        "ui-xs": ["12px", {"lineHeight": "1.5", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "ui-sm": ["14px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "mono-lg": ["18px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "mono-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "marketing-xl": ["48px", {"lineHeight": "1.15", "fontWeight": "400"}],
                        "display-xl": ["38px", {"lineHeight": "1.2", "fontWeight": "400"}],
                        "marketing-hero": ["64px", {"lineHeight": "1.1", "fontWeight": "400"}],
                        "ui-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pt-12 pb-space-96 selection:bg-primary-container selection:text-white">
<!-- Main Container -->
<div class="max-w-4xl w-full mx-auto px-gutter-desktop flex flex-col gap-space-48">
<!-- Header / Shell (Nav suppressed due to transactional intent) -->
<header class="flex flex-col gap-6">
<div class="flex justify-between items-end border-b border-border-subtle pb-6">
<!-- Brand Anchor -->
<div class="font-display-lg text-display-lg font-black tracking-tighter text-on-surface">
                    ComplianceOS
                </div>
<!-- Step Indicator -->
<div class="font-ui-xs text-ui-xs text-text-mid uppercase tracking-widest">
                    Step 1 of 5
                </div>
</div>
<!-- Segmented Progress Bar -->
<div class="flex gap-2 w-full h-1">
<div class="flex-1 bg-primary-container rounded-sm"></div>
<div class="flex-1 bg-border-subtle rounded-sm"></div>
<div class="flex-1 bg-border-subtle rounded-sm"></div>
<div class="flex-1 bg-border-subtle rounded-sm"></div>
<div class="flex-1 bg-border-subtle rounded-sm"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex flex-col gap-12 bg-surface-container-lowest border border-border-subtle p-8 md:p-12 shadow-sm">
<!-- Section Header -->
<div>
<h1 class="font-display-xl text-display-xl text-on-surface mb-3">Business Profile</h1>
<p class="font-ui-md text-ui-md text-text-mid max-w-2xl">
                    Establish your organizational identity. This information ensures your ledgers and regulatory filings are accurately attributed under Indian corporate framework.
                </p>
</div>
<!-- Form Grid -->
<form class="grid grid-cols-1 md:grid-cols-2 gap-x-gutter-wide gap-y-8">
<!-- Business Name -->
<div class="flex flex-col gap-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid" for="businessName">Operating Name</label>
<input class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-text-light" id="businessName" placeholder="e.g. Acme Technologies" type="text"/>
</div>
<!-- Legal Name -->
<div class="flex flex-col gap-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid flex items-center gap-1" for="legalName">
                        Registered Legal Name
                        <span class="material-symbols-outlined text-[14px] text-text-light cursor-help" title="As registered with the MCA">info</span>
</label>
<input class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-text-light" id="legalName" placeholder="e.g. Acme Technologies Private Limited" type="text"/>
</div>
<!-- Business Type -->
<div class="flex flex-col gap-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid" for="businessType">Entity Type</label>
<div class="relative">
<select class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="businessType">
<option disabled="" selected="" value="">Select structure...</option>
<option value="pvt_ltd">Private Limited Company</option>
<option value="llp">Limited Liability Partnership (LLP)</option>
<option value="proprietorship">Sole Proprietorship</option>
<option value="partnership">Partnership Firm</option>
<option value="public_ltd">Public Limited Company</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-mid pointer-events-none">expand_more</span>
</div>
</div>
<!-- Industry -->
<div class="flex flex-col gap-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid" for="industry">Primary Sector</label>
<div class="relative">
<select class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="industry">
<option disabled="" selected="" value="">Select industry...</option>
<option value="it_services">Information Technology</option>
<option value="manufacturing">Manufacturing</option>
<option value="retail">Retail &amp; E-commerce</option>
<option value="services">Professional Services</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-mid pointer-events-none">expand_more</span>
</div>
</div>
<!-- PAN Number (Monospaced) -->
<div class="flex flex-col gap-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid" for="panNumber">Permanent Account Number</label>
<input class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-mono-md text-mono-md text-on-surface uppercase tracking-widest focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-text-light placeholder:normal-case placeholder:tracking-normal" id="panNumber" maxlength="10" placeholder="ABCDE1234F" type="text"/>
</div>
<!-- GSTIN (Monospaced) -->
<div class="flex flex-col gap-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid flex items-center gap-1" for="gstin">
                        GST Identification Number
                        <span class="material-symbols-outlined text-[14px] text-text-light cursor-help" title="Leave blank if not registered">info</span>
</label>
<input class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-mono-md text-mono-md text-on-surface uppercase tracking-widest focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-text-light placeholder:normal-case placeholder:tracking-normal" id="gstin" maxlength="15" placeholder="22AAAAA0000A1Z5" type="text"/>
</div>
<!-- State -->
<div class="flex flex-col gap-2 md:col-span-1">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid" for="state">State of Registration</label>
<div class="relative">
<select class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="state">
<option disabled="" selected="" value="">Select state...</option>
<option value="MH">Maharashtra</option>
<option value="KA">Karnataka</option>
<option value="DL">Delhi</option>
<option value="TN">Tamil Nadu</option>
<option value="GJ">Gujarat</option>
<!-- More states would typically go here -->
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-mid pointer-events-none">expand_more</span>
</div>
</div>
<!-- Spacer for grid alignment if needed, or Address spans full -->
<!-- Address -->
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-ui-xs text-ui-xs uppercase tracking-widest text-text-mid" for="address">Registered Office Address</label>
<textarea class="w-full bg-surface border border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors resize-none placeholder:text-text-light" id="address" placeholder="Enter complete building name, street, and PIN code..." rows="3"></textarea>
</div>
<!-- Footer Actions -->
<div class="md:col-span-2 flex justify-between items-center mt-6 pt-8 border-t border-border-subtle">
<button class="font-ui-sm text-ui-sm text-text-mid hover:text-on-surface transition-colors py-2 px-4 -ml-4" type="button">
                        Save as Draft
                    </button>
<button class="bg-primary-container text-on-primary font-ui-sm text-ui-sm py-3 px-8 rounded-DEFAULT hover:bg-primary transition-colors flex items-center gap-2 group shadow-sm" type="button">
                        Continue to Directors
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform duration-200">arrow_forward</span>
</button>
</div>
</form>
</main>
</div>
</body></html>
