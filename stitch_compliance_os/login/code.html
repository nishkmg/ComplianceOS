<body class="bg-section-muted min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary">
<!-- Login Container -->
<main class="w-full max-w-[440px]">
<!-- Surface Card -->
<div class="bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-lg px-8 py-12 md:px-10 md:py-14 shadow-sm relative overflow-hidden">
<!-- KPI Top Border Accent -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-container"></div>
<!-- Header -->
<div class="text-center mb-10">
<h1 class="font-display-xl text-display-xl text-on-surface tracking-tight mb-2">ComplianceOS</h1>
<p class="font-ui-sm text-ui-sm text-on-surface-variant">Secure access to your fiscal ledger.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block font-ui-xs text-ui-xs text-on-surface uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="email" name="email" placeholder="accountant@firm.in" required="" type="email"/>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block font-ui-xs text-ui-xs text-on-surface uppercase tracking-widest" for="password">Password</label>
<a class="font-ui-xs text-ui-xs text-amber-text hover:text-primary-container transition-colors focus:outline-none focus:underline underline-offset-4" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors pr-10" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<!-- Password Toggle -->
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 flex items-center pr-3 text-on-surface-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-primary-container text-on-primary font-ui-md text-ui-md rounded-DEFAULT py-4 px-6 flex justify-center items-center group transition-colors duration-300 hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface-container-lowest focus:ring-primary-container" type="submit">
                    Access Account
                    <span class="ml-2 transform group-hover:translate-x-1 transition-transform duration-300 ease-in-out font-mono-lg">→</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t-[0.5px] border-border-subtle text-center">
<p class="font-ui-sm text-ui-sm text-on-surface-variant">
                    New to ComplianceOS? 
                    <a class="text-amber-text font-medium hover:text-primary-container hover:underline underline-offset-4 transition-all ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Minimal meta footer -->
<div class="text-center mt-8">
<p class="font-ui-xs text-ui-xs text-text-light uppercase tracking-widest">© 2024 ComplianceOS. Built for Indian Fiscal Realities.</p>
</div>
</main>
