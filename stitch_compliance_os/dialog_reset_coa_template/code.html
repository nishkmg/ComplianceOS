<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ComplianceOS - Reset Confirmation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#C8860A',
                        'primary-container': '#fef3c7',
                        'on-primary-container': '#92400e',
                        surface: '#F9F7F2',
                        'on-surface': '#1c1917',
                        'surface-variant': '#e7e5e4',
                        'on-surface-variant': '#57534e',
                        outline: '#d6d3d1',
                        error: '#dc2626',
                        'error-container': '#fef2f2',
                        'on-error': '#ffffff',
                    },
                    fontFamily: {
                        headline: ["Public Sans", "sans-serif"],
                        display: ["Public Sans", "sans-serif"],
                        body: ["Public Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body h-screen w-full flex items-center justify-center antialiased relative overflow-hidden">
<!-- Background overlay simulating app content behind the dialog -->
<div class="absolute inset-0 bg-stone-100/50 backdrop-blur-sm z-0"></div>
<!-- Dialog Container -->
<div class="relative z-10 w-[400px] max-w-[90vw] bg-surface border-[0.5px] border-outline rounded shadow-xl flex flex-col items-center p-8 text-center">
<!-- Warning Icon -->
<div class="w-16 h-16 rounded-full bg-error-container text-error flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<!-- Title -->
<h2 class="font-headline font-semibold text-xl text-on-surface mb-3 tracking-tight">
            Reset to Template?
        </h2>
<!-- Description -->
<p class="font-body text-sm text-on-surface-variant leading-relaxed mb-8">
            Are you sure you want to reset to the template? All your customizations to the Chart of Accounts will be lost.
        </p>
<!-- Actions -->
<div class="flex flex-col w-full gap-3">
<button class="w-full bg-error text-on-error font-label font-medium text-sm py-2.5 rounded transition-opacity hover:opacity-90 active:opacity-80" type="button">
                Reset to Template
            </button>
<button class="w-full bg-transparent border-[0.5px] border-outline text-on-surface-variant font-label font-medium text-sm py-2.5 rounded transition-colors hover:bg-surface-variant active:bg-outline" type="button">
                Cancel
            </button>
</div>
</div>
</body></html>
