<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ComplianceOS - Add/Edit Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Syne:wght@400;500;600;700;800&amp;family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#211b13",
                        "surface-container-high": "#f3e6d9",
                        "on-secondary-fixed-variant": "#474746",
                        "outline": "#847563",
                        "outline-variant": "#d6c4af",
                        "surface-tint": "#825500",
                        "surface-container": "#f9ecde",
                        "surface-bright": "#fff8f4",
                        "secondary-fixed": "#e5e2e1",
                        "section-muted": "#F4F2EE",
                        "secondary-fixed-dim": "#c8c6c5",
                        "background": "#fff8f4",
                        "surface": "#fff8f4",
                        "inverse-primary": "#ffb950",
                        "secondary-container": "#e2dfde",
                        "secondary": "#5f5e5e",
                        "amber-text": "#B47500",
                        "tertiary-fixed": "#cae6ff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#8ecdff",
                        "tertiary-container": "#309bdb",
                        "primary-fixed": "#ffddb3",
                        "surface-container-highest": "#ede0d3",
                        "text-mid": "#555555",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#fcefe1",
                        "on-tertiary-container": "#002f49",
                        "primary-fixed-dim": "#ffb950",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#fff1e4",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#006494",
                        "on-surface-variant": "#514535",
                        "text-light": "#888888",
                        "surface-dim": "#e5d8cb",
                        "on-primary-fixed-variant": "#633f00",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "section-dark": "#111111",
                        "page-bg": "#FAFAF8",
                        "on-secondary-container": "#636262",
                        "primary-container": "#c8860a",
                        "on-tertiary-fixed": "#001e30",
                        "primary": "#825500",
                        "inverse-surface": "#362f27",
                        "on-surface": "#211b13",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#004b70",
                        "surface-variant": "#ede0d3",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary-container": "#3f2700",
                        "on-primary-fixed": "#291800",
                        "border-subtle": "#E8E4DC",
                        "section-amber": "rgba(200, 134, 10, 0.06)"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "space-48": "48px",
                        "space-128": "128px",
                        "space-64": "64px",
                        "gutter-wide": "32px",
                        "gutter-desktop": "24px",
                        "space-96": "96px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "marketing-xl": ["Playfair Display"],
                        "ui-xs": ["Syne"],
                        "ui-sm": ["Syne"],
                        "ui-lg": ["Syne"],
                        "mono-md": ["DM Mono"],
                        "marketing-hero": ["Playfair Display"],
                        "ui-md": ["Syne"],
                        "mono-lg": ["DM Mono"],
                        "display-xl": ["Playfair Display"],
                        "display-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "marketing-xl": ["48px", { "lineHeight": "1.15", "fontWeight": "400" }],
                        "ui-xs": ["12px", { "lineHeight": "1.5", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "ui-sm": ["14px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "ui-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "mono-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "marketing-hero": ["64px", { "lineHeight": "1.1", "fontWeight": "400" }],
                        "ui-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "mono-lg": ["18px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "display-xl": ["38px", { "lineHeight": "1.2", "fontWeight": "400" }],
                        "display-lg": ["26px", { "lineHeight": "1.3", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-section-muted font-ui-sm text-on-surface antialiased flex items-center justify-center min-h-screen">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="relative bg-surface w-full max-w-2xl border-[0.5px] border-border-subtle shadow-lg z-50 overflow-hidden rounded-DEFAULT flex flex-col">
<!-- Header -->
<div class="border-b-[0.5px] border-border-subtle px-8 py-6 flex justify-between items-center bg-surface-bright">
<div>
<h2 class="font-display-lg text-display-lg text-on-surface mb-1">Add Account</h2>
<p class="font-ui-sm text-ui-sm text-text-mid">Configure a new entry in the Chart of Accounts.</p>
</div>
<button aria-label="Close dialog" class="text-text-mid hover:text-on-surface transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Body -->
<div class="px-8 py-8 flex flex-col gap-6 overflow-y-auto">
<div class="grid grid-cols-2 gap-6">
<!-- Account Name -->
<div class="col-span-2">
<label class="block font-ui-xs text-ui-xs text-on-surface mb-2 tracking-widest uppercase" for="account_name">Account Name</label>
<input class="w-full bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-amber-text focus:ring-1 focus:ring-amber-text transition-all" id="account_name" placeholder="e.g. Accounts Receivable - Domestic" type="text" value="Software Licenses"/>
</div>
<!-- Account Code -->
<div>
<label class="block font-ui-xs text-ui-xs text-on-surface mb-2 tracking-widest uppercase" for="account_code">Account Code</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-text-light font-mono-md text-mono-md">
                            #
                        </span>
<input class="w-full bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-DEFAULT pl-8 pr-4 py-3 font-mono-md text-mono-md text-on-surface focus:outline-none focus:border-amber-text focus:ring-1 focus:ring-amber-text transition-all" id="account_code" placeholder="1000" type="text" value="1520"/>
</div>
</div>
<!-- Parent Account -->
<div>
<label class="block font-ui-xs text-ui-xs text-on-surface mb-2 tracking-widest uppercase" for="parent_account">Parent Account</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface appearance-none focus:outline-none focus:border-amber-text focus:ring-1 focus:ring-amber-text transition-all" id="parent_account">
<option value="">None (Top Level)</option>
<option value="1000">1000 - Assets</option>
<option selected="" value="1500">-- 1500 - Intangible Assets</option>
<option value="2000">2000 - Liabilities</option>
</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-text-mid">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</span>
</div>
</div>
<!-- Account Type -->
<div class="col-span-2 mt-2">
<label class="block font-ui-xs text-ui-xs text-on-surface mb-2 tracking-widest uppercase">Account Type</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
<label class="relative flex flex-col p-4 cursor-pointer border-[0.5px] border-amber-text bg-surface-container rounded-DEFAULT">
<input checked="" class="sr-only" name="account_type" type="radio" value="asset"/>
<span class="font-ui-sm text-ui-sm text-on-surface font-medium mb-1">Asset</span>
<span class="font-ui-xs text-ui-xs text-text-mid normal-case tracking-normal">Debit normal</span>
</label>
<label class="relative flex flex-col p-4 cursor-pointer border-[0.5px] border-border-subtle hover:border-text-mid bg-surface-container-lowest rounded-DEFAULT transition-colors">
<input class="sr-only" name="account_type" type="radio" value="liability"/>
<span class="font-ui-sm text-ui-sm text-on-surface font-medium mb-1">Liability</span>
<span class="font-ui-xs text-ui-xs text-text-mid normal-case tracking-normal">Credit normal</span>
</label>
<label class="relative flex flex-col p-4 cursor-pointer border-[0.5px] border-border-subtle hover:border-text-mid bg-surface-container-lowest rounded-DEFAULT transition-colors">
<input class="sr-only" name="account_type" type="radio" value="equity"/>
<span class="font-ui-sm text-ui-sm text-on-surface font-medium mb-1">Equity</span>
<span class="font-ui-xs text-ui-xs text-text-mid normal-case tracking-normal">Credit normal</span>
</label>
<label class="relative flex flex-col p-4 cursor-pointer border-[0.5px] border-border-subtle hover:border-text-mid bg-surface-container-lowest rounded-DEFAULT transition-colors">
<input class="sr-only" name="account_type" type="radio" value="revenue"/>
<span class="font-ui-sm text-ui-sm text-on-surface font-medium mb-1">Revenue</span>
<span class="font-ui-xs text-ui-xs text-text-mid normal-case tracking-normal">Credit normal</span>
</label>
</div>
<!-- Warning Alert -->
<div class="flex items-start gap-3 p-4 bg-section-amber border-l-2 border-primary-container rounded-r-DEFAULT mt-4">
<span class="material-symbols-outlined text-primary-container fill mt-0.5" data-icon="warning" data-weight="fill">warning</span>
<div>
<p class="font-ui-sm text-ui-sm text-on-surface font-medium">Account Type Immutability</p>
<p class="font-ui-sm text-ui-sm text-text-mid mt-1">Once transactions are posted to this account, its fundamental type cannot be altered to maintain ledger integrity.</p>
</div>
</div>
</div>
</div>
<!-- Description -->
<div>
<label class="block font-ui-xs text-ui-xs text-on-surface mb-2 tracking-widest uppercase" for="description">Description (Optional)</label>
<textarea class="w-full bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-amber-text focus:ring-1 focus:ring-amber-text transition-all resize-none" id="description" placeholder="Provide context for this account's intended use..." rows="3"></textarea>
</div>
</div>
<!-- Footer Actions -->
<div class="border-t-[0.5px] border-border-subtle px-8 py-4 bg-surface-bright flex justify-end gap-4">
<button class="px-6 py-2.5 font-ui-sm text-ui-sm text-text-mid hover:text-on-surface transition-colors cursor-pointer rounded-DEFAULT">
                Cancel
            </button>
<button class="px-6 py-2.5 bg-primary-container text-on-primary font-ui-sm text-ui-sm rounded-DEFAULT hover:bg-surface-tint transition-colors flex items-center gap-2 group cursor-pointer">
                Save Account
                <span class="group-hover:translate-x-1 transition-transform inline-block">→</span>
</button>
</div>
</div>
</body></html>
