<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dialog: Post Entry Confirmation - ComplianceOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {},
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Public Sans", "sans-serif"
                    ],
                    "display": [
                            "Public Sans", "sans-serif"
                    ],
                    "body": [
                            "Public Sans", "sans-serif"
                    ],
                    "label": [
                            "Public Sans", "sans-serif"
                    ]
            },
            "fontSize": {}
    },
        },
      }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#F9F7F2] text-stone-900 h-screen w-full flex items-center justify-center p-4 antialiased overflow-hidden">
<!-- Modal Backdrop overlay -->
<div aria-hidden="true" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-40 transition-opacity duration-300"></div>
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="relative z-50 w-full max-w-lg bg-white rounded-lg shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col border border-stone-200" role="dialog">
<!-- Header -->
<div class="flex items-start justify-between p-6 border-b-[0.5px] border-stone-200 bg-[#F9F7F2]">
<div class="flex items-center space-x-3">
<div class="flex-shrink-0 bg-amber-100/50 p-2 rounded-full border-[0.5px] border-amber-200">
<span class="material-symbols-outlined text-[#C8860A]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h3 class="text-xl font-bold font-headline text-stone-900 tracking-tight" id="modal-title">Confirm Post Entry</h3>
</div>
<button aria-label="Close dialog" class="text-stone-400 hover:text-stone-600 transition-colors focus:outline-none focus:ring-2 focus:ring-[#C8860A] rounded p-1" type="button">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Body Content -->
<div class="p-6 flex-grow overflow-y-auto">
<p class="text-sm font-body text-stone-600 mb-6 leading-relaxed">
                Posting is irreversible and will update the general ledger. Ensure all amounts are correct.
            </p>
<!-- Summary Card -->
<div class="bg-stone-50 border-[0.5px] border-stone-200 rounded p-5 space-y-4">
<div class="flex justify-between items-center pb-3 border-b-[0.5px] border-stone-200 border-dashed">
<span class="text-xs font-label text-stone-500 uppercase tracking-wider">Entry Number</span>
<span class="text-sm font-medium font-body text-stone-900">JE-2024-0891</span>
</div>
<div class="flex justify-between items-center pb-3 border-b-[0.5px] border-stone-200 border-dashed">
<span class="text-xs font-label text-stone-500 uppercase tracking-wider">Posting Date</span>
<span class="text-sm font-medium font-body text-stone-900">Oct 24, 2024</span>
</div>
<div class="flex justify-between items-center pt-1">
<span class="text-xs font-label font-bold text-stone-700 uppercase tracking-wider">Total Amount</span>
<span class="text-lg font-bold font-body text-[#C8860A]">$14,500.00</span>
</div>
</div>
<!-- Contextual details -->
<div class="mt-4 flex items-start gap-2 text-xs text-stone-500 bg-stone-50/50 p-3 rounded border-[0.5px] border-stone-100">
<span class="material-symbols-outlined text-[16px] text-stone-400 mt-0.5">info</span>
<p class="font-body leading-tight">This entry affects 4 accounts across 2 entities. It will be logged under fiscal period Q4-2024.</p>
</div>
</div>
<!-- Footer Actions -->
<div class="px-6 py-4 border-t-[0.5px] border-stone-200 bg-stone-50 flex justify-end space-x-3 rounded-b-lg">
<button class="px-5 py-2.5 text-sm font-medium font-label text-stone-600 bg-transparent border border-stone-300 rounded hover:bg-stone-100 hover:text-stone-900 transition-colors focus:outline-none focus:ring-2 focus:ring-stone-400 shadow-sm" type="button">
                Cancel
            </button>
<button class="px-5 py-2.5 text-sm font-medium font-label text-white bg-[#C8860A] rounded hover:bg-amber-600 border border-amber-600 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#C8860A] flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">publish</span>
                Post Entry
            </button>
</div>
</div>
</body></html>
