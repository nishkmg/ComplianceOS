<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="relative bg-surface w-full max-w-2xl border border-border-subtle shadow-lg z-50 rounded flex flex-col" role="dialog">
<!-- Header -->
<div class="px-6 py-4 border-b border-border-subtle flex justify-between items-center bg-surface-container-lowest rounded-t">
<div>
<h2 class="font-display-lg text-display-lg text-on-surface mb-1" id="modal-title">Amend GST Return</h2>
<p class="font-ui-sm text-ui-sm text-text-mid">Modify previously filed return data for FY 23-24 Q2.</p>
</div>
<button aria-label="Close dialog" class="text-text-mid hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Content -->
<div class="p-6 flex-1 overflow-y-auto">
<div class="mb-4">
<label class="block font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest mb-2" for="amendment-data">Amendment Data (JSON)</label>
<div class="border border-border-subtle rounded relative bg-white">
<div class="flex items-center justify-between px-3 py-2 border-b border-border-subtle bg-surface-container-lowest">
<span class="font-mono-md text-mono-md text-text-mid text-[12px]">return_payload.json</span>
<div class="flex gap-2">
<button class="text-text-mid hover:text-primary transition-colors"><span class="material-symbols-outlined text-[16px]" data-icon="content_copy">content_copy</span></button>
<button class="text-text-mid hover:text-primary transition-colors"><span class="material-symbols-outlined text-[16px]" data-icon="format_align_left">format_align_left</span></button>
</div>
</div>
<textarea class="w-full p-4 font-mono-md text-mono-md text-on-surface bg-transparent border-none focus:ring-0 resize-y outline-none block" id="amendment-data" rows="12" spellcheck="false">{
  "gstin": "27AADCB2230M1Z2",
  "fp": "072023",
  "gt": 15000000,
  "cur_gt": 2500000,
  "b2b": [
    {
      "ctin": "06BZBPM8991P1ZV",
      "inv": [
        {
          "inum": "INV-23-441",
          "idt": "15-07-2023",
          "val": 45000.50,
          "pos": "06",
          "rchrg": "N",
          "itms": [
            {
              "num": 1,
              "itm_det": {
                "rt": 18.0,
                "txval": 38136.02,
                "iamt": 6864.48,
                "csamt": 0.0
              }
            }
          ]
        }
      ]
    }
  ]
}

                        </p>
