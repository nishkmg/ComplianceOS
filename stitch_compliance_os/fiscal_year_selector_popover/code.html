<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ComplianceOS - Fiscal Year Popover</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Syne:wght@400..800&amp;family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-background": "#211b13",
            "surface-container-high": "#f3e6d9",
            "on-secondary-fixed-variant": "#474746",
            "outline": "#847563",
            "outline-variant": "#d6c4af",
            "surface-tint": "#825500",
            "surface-container": "#f9ecde",
            "surface-bright": "#fff8f4",
            "secondary-fixed": "#e5e2e1",
            "section-muted": "#F4F2EE",
            "secondary-fixed-dim": "#c8c6c5",
            "background": "#fff8f4",
            "surface": "#fff8f4",
            "inverse-primary": "#ffb950",
            "secondary-container": "#e2dfde",
            "secondary": "#5f5e5e",
            "amber-text": "#B47500",
            "tertiary-fixed": "#cae6ff",
            "on-secondary": "#ffffff",
            "tertiary-fixed-dim": "#8ecdff",
            "tertiary-container": "#309bdb",
            "primary-fixed": "#ffddb3",
            "surface-container-highest": "#ede0d3",
            "text-mid": "#555555",
            "error-container": "#ffdad6",
            "inverse-on-surface": "#fcefe1",
            "on-tertiary-container": "#002f49",
            "primary-fixed-dim": "#ffb950",
            "error": "#ba1a1a",
            "on-error-container": "#93000a",
            "surface-container-low": "#fff1e4",
            "on-tertiary": "#ffffff",
            "tertiary": "#006494",
            "on-surface-variant": "#514535",
            "text-light": "#888888",
            "surface-dim": "#e5d8cb",
            "on-primary-fixed-variant": "#633f00",
            "on-error": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "section-dark": "#111111",
            "page-bg": "#FAFAF8",
            "on-secondary-container": "#636262",
            "primary-container": "#c8860a",
            "on-tertiary-fixed": "#001e30",
            "primary": "#825500",
            "inverse-surface": "#362f27",
            "on-surface": "#211b13",
            "on-primary": "#ffffff",
            "on-tertiary-fixed-variant": "#004b70",
            "surface-variant": "#ede0d3",
            "on-secondary-fixed": "#1c1b1b",
            "on-primary-container": "#3f2700",
            "on-primary-fixed": "#291800",
            "border-subtle": "#E8E4DC",
            "section-amber": "rgba(200, 134, 10, 0.06)"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "space-48": "48px",
            "space-128": "128px",
            "space-64": "64px",
            "gutter-wide": "32px",
            "gutter-desktop": "24px",
            "space-96": "96px",
            "margin-mobile": "16px"
          },
          "fontFamily": {
            "marketing-xl": ["Playfair Display"],
            "ui-xs": ["Syne"],
            "ui-sm": ["Syne"],
            "ui-lg": ["Syne"],
            "mono-md": ["DM Mono"],
            "marketing-hero": ["Playfair Display"],
            "ui-md": ["Syne"],
            "mono-lg": ["DM Mono"],
            "display-xl": ["Playfair Display"],
            "display-lg": ["Playfair Display"]
          },
          "fontSize": {
            "marketing-xl": ["48px", {"lineHeight": "1.15", "fontWeight": "400"}],
            "ui-xs": ["12px", {"lineHeight": "1.5", "letterSpacing": "0.1em", "fontWeight": "500"}],
            "ui-sm": ["14px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "ui-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "500"}],
            "mono-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "marketing-hero": ["64px", {"lineHeight": "1.1", "fontWeight": "400"}],
            "ui-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "mono-lg": ["18px", {"lineHeight": "1.4", "fontWeight": "400"}],
            "display-xl": ["38px", {"lineHeight": "1.2", "fontWeight": "400"}],
            "display-lg": ["26px", {"lineHeight": "1.3", "fontWeight": "400"}]
          }
        }
      }
    }
  </script>
</head>
<body class="bg-page-bg text-on-background min-h-screen flex items-center justify-center p-gutter-wide">
<div class="relative inline-block text-left">
<!-- Trigger Button (Simulated Footer Tab) -->
<button class="flex items-center gap-2 px-4 py-2 hover:bg-stone-50 transition-colors duration-150 select-none" type="button">
<span class="material-symbols-outlined text-stone-500 text-[18px]">calendar_today</span>
<span class="font-ui-xs text-ui-xs text-stone-500 uppercase tracking-widest">Change Fiscal Year</span>
</button>
<!-- Popover Container -->
<div class="absolute bottom-full left-0 mb-2 w-80 bg-surface-bright border-[0.5px] border-border-subtle shadow-sm z-50 origin-bottom-left flex flex-col focus:outline-none">
<!-- Header -->
<div class="px-4 py-3 border-b-[0.5px] border-border-subtle bg-surface-container-low">
<h3 class="font-ui-sm text-ui-sm text-on-surface font-medium">Select Fiscal Year</h3>
</div>
<!-- FY List -->
<div class="flex flex-col py-1">
<!-- Active FY (2024-25) -->
<button class="w-full flex items-center justify-between px-4 py-3 bg-section-amber border-l-[3px] border-l-primary-container hover:bg-surface-container-high transition-colors text-left group">
<div class="flex flex-col gap-1">
<span class="font-mono-md text-mono-md text-on-surface group-hover:text-primary-container transition-colors">FY 2024-25</span>
<div class="flex items-center gap-2">
<span class="font-ui-xs text-ui-xs text-amber-text bg-amber-100/50 px-1.5 py-0.5 rounded-sm border-[0.5px] border-amber-200">Open</span>
<span class="font-ui-xs text-ui-xs text-text-light lowercase tracking-normal">42 days remaining</span>
</div>
</div>
<span class="material-symbols-outlined text-primary-container text-[20px] opacity-100">check</span>
</button>
<!-- Closed FY (2023-24) -->
<button class="w-full flex items-center justify-between px-4 py-3 border-l-[3px] border-l-transparent hover:bg-surface-container transition-colors text-left group">
<div class="flex flex-col gap-1">
<span class="font-mono-md text-mono-md text-text-mid group-hover:text-on-surface transition-colors">FY 2023-24</span>
<div class="flex items-center gap-2">
<span class="font-ui-xs text-ui-xs text-text-mid bg-secondary-fixed px-1.5 py-0.5 rounded-sm border-[0.5px] border-border-subtle">Closed</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface text-[20px] opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
</button>
<!-- Closed FY (2022-23) -->
<button class="w-full flex items-center justify-between px-4 py-3 border-l-[3px] border-l-transparent hover:bg-surface-container transition-colors text-left group">
<div class="flex flex-col gap-1">
<span class="font-mono-md text-mono-md text-text-light group-hover:text-on-surface transition-colors">FY 2022-23</span>
<div class="flex items-center gap-2">
<span class="font-ui-xs text-ui-xs text-text-light bg-secondary-container px-1.5 py-0.5 rounded-sm border-[0.5px] border-border-subtle opacity-70">Archived</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface text-[20px] opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
</button>
</div>
<!-- Footer Action -->
<div class="px-4 py-3 border-t-[0.5px] border-border-subtle bg-surface-container-low mt-1">
<button class="w-full flex items-center justify-center gap-2 font-ui-sm text-ui-sm text-primary-container hover:text-amber-text transition-colors">
<span class="material-symbols-outlined text-[16px]">add</span>
            New Fiscal Year
         </button>
</div>
</div>
</div>
</body></html>
