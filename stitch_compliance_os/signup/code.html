<body class="bg-page-bg text-on-surface min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 antialiased selection:bg-primary-container selection:text-on-primary">
<!-- Main Content Canvas -->
<main class="w-full max-w-md">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight mb-2">ComplianceOS</h1>
<p class="font-ui-md text-ui-md text-text-mid">Establish your firm's foundational ledger.</p>
</div>
<!-- Centered Card -->
<div class="bg-surface-container-lowest border-[0.5px] border-border-subtle border-t-[2px] border-t-primary-container p-8 shadow-sm">
<!-- Progress Hint -->
<div class="flex items-center justify-between mb-8 pb-4 border-b-[0.5px] border-border-subtle">
<span class="font-mono-md text-mono-md text-text-mid tracking-widest uppercase">Step 1 of 7</span>
<span class="font-ui-xs text-ui-xs text-amber-text">Entity Setup</span>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Business Name Field -->
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface mb-2" for="business_name">Registered Business Name</label>
<input class="block w-full border-[0.5px] border-border-subtle bg-transparent px-3 py-2 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:border-primary focus:ring-0 focus:outline-none transition-colors" id="business_name" name="business_name" placeholder="As per MCA/GST records" required="" type="text"/>
</div>
<!-- Email Field -->
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface mb-2" for="email">Primary Contact Email</label>
<input class="block w-full border-[0.5px] border-border-subtle bg-transparent px-3 py-2 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:border-primary focus:ring-0 focus:outline-none transition-colors" id="email" name="email" placeholder="admin@yourfirm.in" required="" type="email"/>
</div>
<!-- Password Field with Strength -->
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface mb-2" for="password">Secure Password</label>
<div class="relative">
<input class="block w-full border-[0.5px] border-border-subtle bg-transparent px-3 py-2 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:border-primary focus:ring-0 focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Password Strength Indicator -->
<div class="mt-2 flex gap-1 h-1 w-full">
<div class="w-1/3 bg-primary-container h-full"></div>
<div class="w-1/3 bg-border-subtle h-full"></div>
<div class="w-1/3 bg-border-subtle h-full"></div>
</div>
<p class="mt-1 font-ui-xs text-ui-xs text-text-light text-right">Weak</p>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface mb-2" for="confirm_password">Confirm Password</label>
<input class="block w-full border-[0.5px] border-border-subtle bg-transparent px-3 py-2 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:border-primary focus:ring-0 focus:outline-none transition-colors" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="group w-full flex items-center justify-center gap-2 bg-primary-container border-[0.5px] border-primary-container px-6 py-3 font-ui-sm text-ui-sm text-on-primary hover:bg-surface-tint hover:border-surface-tint transition-all duration-300" type="submit">
                        Continue to Firm Details
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Meta Links -->
<div class="mt-8 text-center">
<p class="font-ui-sm text-ui-sm text-text-mid">
                Already maintaining a ledger? 
                <a class="text-primary hover:text-surface-tint underline decoration-primary-container/30 decoration-2 underline-offset-4 transition-colors" href="#">Log in</a>
</p>
