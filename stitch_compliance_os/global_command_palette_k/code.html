<body class="bg-page-bg font-ui-sm text-ui-sm text-on-surface antialiased h-screen w-screen overflow-hidden">
<!-- App Background Simulation (Out of Focus) -->
<div class="absolute inset-0 z-0 p-8 opacity-40 grayscale-[0.2]">
<div class="h-16 border-b-[0.5px] border-border-subtle flex items-center px-8 mb-8">
<span class="font-marketing-xl text-marketing-xl text-on-surface">ComplianceOS</span>
</div>
<div class="flex gap-8 px-8">
<div class="w-64 border-[0.5px] border-border-subtle h-[819px] p-4"></div>
<div class="flex-1 border-[0.5px] border-border-subtle h-[819px] p-8">
<div class="w-1/3 h-8 bg-section-muted mb-8"></div>
<div class="w-full h-64 bg-section-muted"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="relative z-50 flex items-start justify-center pt-[153px] w-full h-full bg-on-background/60 backdrop-blur-md">
<!-- Command Palette Container -->
<div class="w-full max-w-2xl bg-surface-container-lowest rounded border-[0.5px] border-border-subtle shadow-2xl flex flex-col overflow-hidden">
<!-- Search Header -->
<div class="flex items-center px-4 py-3 border-b-[0.5px] border-border-subtle bg-surface-container-lowest">
<span class="material-symbols-outlined text-text-light mr-3 text-xl">search</span>
<input autofocus="" class="flex-1 bg-transparent border-none outline-none focus:ring-0 p-0 font-ui-md text-ui-md text-on-surface placeholder-text-light" placeholder="Search commands, pages, or entities..." type="text"/>
<div class="flex items-center gap-2">
<span class="font-mono-md text-mono-md text-text-light bg-section-muted px-2 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">ESC</span>
</div>
</div>
<!-- Scrollable Results Area -->
<div class="max-h-[614px] overflow-y-auto p-2 scrollbar-hide">
<!-- Category: Pages -->
<div class="mb-4">
<div class="px-3 py-2 font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest">
                        Pages
                    </div>
<div class="flex flex-col gap-0.5">
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded bg-section-muted border-l-2 border-primary-container text-left group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-lg">dashboard</span>
<span class="font-ui-sm text-ui-sm text-on-surface font-medium">Dashboard</span>
</div>
<div class="flex items-center gap-1 opacity-100">
<span class="font-mono-md text-mono-md text-text-mid bg-surface-container-highest px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">G</span>
<span class="font-mono-md text-mono-md text-text-mid bg-surface-container-highest px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">D</span>
</div>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">description</span>
<span class="font-ui-sm text-ui-sm text-text-mid group-hover:text-on-surface">Journal Entries</span>
</div>
<div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">G</span>
<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">J</span>
</div>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">receipt_long</span>
<span class="font-ui-sm text-ui-sm text-text-mid group-hover:text-on-surface">GST Filings</span>
</div>
<div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">G</span>
<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">F</span>
</div>
</button>
</div>
</div>
<div class="w-full h-px bg-border-subtle my-2"></div>

<div class="mb-4">
<div class="px-3 py-2 font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest">

                    </div>
<div class="flex flex-col gap-0.5">
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">history</span>
<span class="font-ui-sm text-ui-sm text-text-mid group-hover:text-on-surface">Recent: JE-2024-001</span>
</div>
<div class="flex items-center gap-2">
<span class="font-mono-md text-mono-md text-text-light text-xs">Mar 12</span>
<span class="material-symbols-outlined text-text-light text-sm opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
</div>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">history</span>
<span class="font-ui-sm text-ui-sm text-text-mid group-hover:text-on-surface">Recent: INV-9982</span>
</div>
<div class="flex items-center gap-2">
<span class="font-mono-md text-mono-md text-text-light text-xs">Mar 10</span>
<span class="material-symbols-outlined text-text-light text-sm opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
</div>
</button>
</div>
</div>
<div class="w-full h-px bg-border-subtle my-2"></div>

<div class="px-3 py-2 font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest">

<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">account_tree</span>
<span class="font-ui-sm text-ui-sm text-text-mid group-hover:text-on-surface">Search Chart of Accounts (CoA)</span>
</div>
</button>
</div>
</div>
<div class="w-full h-px bg-border-subtle my-2"></div>
<!-- Category: Actions -->
<div class="mb-2">
<div class="px-3 py-2 font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest">
                        Actions
                    </div>
<div class="flex flex-col gap-0.5">
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">

<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">add_circle</span>
<span class="font-ui-sm text-ui-sm text-text-mid group-hover:text-on-surface">Create New Invoice</span>
</div>
<div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">C</span>
<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">I</span>
</div>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">play_circle</span>

<span class="font-mono-md text-mono-md text-text-light bg-surface-container px-1.5 py-0.5 rounded border-[0.5px] border-border-subtle text-xs">P</span>

<button class="w-full flex items-center justify-between px-3 py-2.5 rounded hover:bg-section-muted border-l-2 border-transparent hover:border-border-subtle text-left group transition-colors">

<span class="material-symbols-outlined text-text-light group-hover:text-text-mid text-lg">download</span>

<span class="material-symbols-outlined text-[14px]">keyboard_return</span>
<span class="font-mono-md text-mono-md text-[10px]">to select</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">swap_vert</span>
<span class="font-mono-md text-mono-md text-[10px]">to navigate</span>
</div>
</div>
<span class="font-marketing-xl text-marketing-xl text-[14px] text-text-mid opacity-50">ComplianceOS</span>
</div>
</div>
</div>
