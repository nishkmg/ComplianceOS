<style>
        .shadow-screenshot {
            box-shadow: 0 24px 48px -12px rgba(33, 27, 19, 0.15);

        input[type="number"]::-webkit-outer-spin-button {

<body class="bg-page-bg font-ui-md text-on-surface antialiased h-screen w-screen overflow-hidden flex items-center justify-center">
<div class="fixed inset-0 bg-on-surface/10 backdrop-blur-[2px] z-40"></div>
<div class="relative z-50 w-full max-w-lg bg-surface-container-lowest border-[0.5px] border-border-subtle shadow-screenshot flex flex-col mx-4 md:mx-auto">
<div class="px-8 pt-8 pb-6 border-b-[0.5px] border-border-subtle flex justify-between items-start">
<div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-1">Adjust Stock</h1>
<p class="font-ui-sm text-ui-sm text-text-mid">Record inventory corrections or shrinkage.</p>
</div>
<button aria-label="Close dialog" class="text-text-mid hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<div class="p-8 flex flex-col gap-8">
<div class="bg-section-muted border-[0.5px] border-border-subtle p-6 flex flex-col gap-4">
<div class="flex justify-between items-start">
<div>
<label class="block font-ui-xs text-ui-xs text-text-mid uppercase tracking-widest mb-1">Product</label>
<div class="font-ui-md text-ui-md text-on-surface font-medium">Arabica Coffee Beans - 1kg</div>
<div class="font-mono-md text-mono-md text-text-light mt-0.5">SKU: CF-ARB-1K-001</div>
</div>
<div class="text-right">
<label class="block font-ui-xs text-ui-xs text-text-mid uppercase tracking-widest mb-1">Current Stock</label>
<div class="font-mono-lg text-mono-lg text-on-surface">1,450.00</div>
</div>
</div>
</div>
<div class="flex flex-col gap-6">
<div class="flex gap-6">
<div class="flex-1">
<label class="block font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest mb-2" for="adj_quantity">Adjustment Qty (+/-)</label>
<div class="relative flex items-center border-[0.5px] border-outline-variant bg-surface-container-lowest focus-within:border-primary-container transition-colors h-12">
<span class="material-symbols-outlined text-text-light pl-4 pr-2 text-[20px]">calculate</span>
<input class="w-full bg-transparent border-none p-0 font-mono-md text-mono-md text-on-surface focus:ring-0 placeholder:text-text-light/50 h-full" id="adj_quantity" placeholder="-15.00" type="number"/>
</div>
</div>
<div class="flex-1">
<label class="block font-ui-xs text-ui-xs text-text-mid uppercase tracking-widest mb-2">New Balance</label>
<div class="h-12 flex items-center px-4 bg-section-muted border-[0.5px] border-border-subtle font-mono-md text-mono-md text-text-mid">
                            1,435.00
                        </div>
</div>
</div>
<div>
<label class="block font-ui-xs text-ui-xs text-amber-text uppercase tracking-widest mb-2" for="adj_reason">Reason for Adjustment</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border-[0.5px] border-outline-variant h-12 px-4 font-ui-sm text-ui-sm text-on-surface focus:border-primary-container focus:ring-0 transition-colors rounded-none" id="adj_reason">
<option disabled="" selected="" value="">Select a reason...</option>
<option value="shrinkage">Inventory Shrinkage (Theft/Loss)</option>
<option value="damage">Damaged Goods</option>
<option value="correction">Count Correction</option>
<option value="expired">Expired Stock</option>
<option value="other">Other (Specify in notes)</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-text-mid">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<div>
<label class="block font-ui-xs text-ui-xs text-text-mid uppercase tracking-widest mb-2" for="adj_notes">Supporting Notes (Optional)</label>
<textarea class="w-full bg-surface-container-lowest border-[0.5px] border-outline-variant p-4 font-ui-sm text-ui-sm text-on-surface focus:border-primary-container focus:ring-0 transition-colors resize-none placeholder:text-text-light" id="adj_notes" placeholder="Reference physical count sheet or incident report..." rows="2"></textarea>
</div>
</div>
<div class="flex items-start gap-3 p-4 bg-section-amber border-[0.5px] border-outline-variant/30">
<span class="material-symbols-outlined text-primary-container text-[20px] mt-0.5 icon-fill">info</span>
<p class="font-ui-xs text-ui-xs text-on-surface-variant leading-relaxed normal-case tracking-normal">
                    This adjustment will automatically post a journal entry to the designated <span class="font-mono-md text-[11px] bg-white border-[0.5px] border-border-subtle px-1">6400 - Inventory Adjustment</span> account for the current fiscal period.
                </p>
</div>
</div>
<div class="px-8 py-6 bg-surface border-t-[0.5px] border-border-subtle flex justify-end gap-4 items-center">
<button class="font-ui-sm text-ui-sm text-text-mid hover:text-on-surface px-4 py-2 transition-colors">
                Cancel
            </button>
<button class="font-ui-sm text-ui-sm bg-primary-container text-on-primary px-8 py-3 flex items-center gap-2 hover:bg-primary transition-colors group">
                Confirm Adjustment
                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
