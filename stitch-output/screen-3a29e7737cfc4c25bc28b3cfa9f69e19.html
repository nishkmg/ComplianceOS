<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-section-muted font-ui-md text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Overlay Background -->
<div class="fixed inset-0 bg-surface-variant/80 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="relative z-50 bg-surface-container-lowest w-full max-w-md rounded-lg border-[0.5px] border-border-subtle shadow-sm flex flex-col">
<!-- Header -->
<div class="px-6 py-5 border-b-[0.5px] border-border-subtle flex justify-between items-center">
<h2 class="font-ui-lg text-ui-lg text-on-surface">File GSTR-3B — September 2024</h2>
<button class="text-text-light hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Content -->
<div class="p-6 space-y-6">
<!-- Input Field: ARN -->
<div class="space-y-2">
<label class="block font-ui-sm text-ui-sm text-on-surface-variant uppercase tracking-wider" for="arn">ARN (Acknowledgement Reference Number)</label>
<div class="relative">
<input class="w-full bg-surface border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-mono-md text-mono-md text-on-surface placeholder-text-light focus:outline-none focus:border-outline focus:ring-1 focus:ring-outline transition-shadow" id="arn" placeholder="Enter 15-digit ARN" type="text"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-light">numbers</span>
</div>
<p class="font-ui-xs text-ui-xs text-text-light mt-1">Found on your GST portal acknowledgement receipt.</p>
</div>
<!-- Input Field: Filing Date -->
<div class="space-y-2">
<label class="block font-ui-sm text-ui-sm text-on-surface-variant uppercase tracking-wider" for="filing-date">Filing Date</label>
<div class="relative">
<input class="w-full bg-surface border-[0.5px] border-border-subtle rounded-DEFAULT px-4 py-3 font-mono-md text-mono-md text-on-surface focus:outline-none focus:border-outline focus:ring-1 focus:ring-outline transition-shadow appearance-none" id="filing-date" type="date" value="2024-10-24"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-light pointer-events-none">calendar_today</span>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-6 py-5 bg-surface-container/30 border-t-[0.5px] border-border-subtle flex items-center justify-end space-x-4 rounded-b-lg">
<button class="font-ui-sm text-ui-sm text-text-mid hover:text-on-surface transition-colors px-4 py-2">
                Cancel
            </button>
<button class="bg-primary-container text-on-primary font-ui-sm text-ui-sm px-6 py-3 flex items-center space-x-2 rounded-DEFAULT hover:opacity-90 transition-opacity shadow-sm group">
<span>Commit to Ledger</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</body></html>
