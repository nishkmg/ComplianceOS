<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ComplianceOS - Journal Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Syne:wght@400;500;700&amp;family=DM+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-background": "#211b13",
                      "surface-container-high": "#f3e6d9",
                      "on-secondary-fixed-variant": "#474746",
                      "outline": "#847563",
                      "outline-variant": "#d6c4af",
                      "surface-tint": "#825500",
                      "surface-container": "#f9ecde",
                      "surface-bright": "#fff8f4",
                      "secondary-fixed": "#e5e2e1",
                      "section-muted": "#F4F2EE",
                      "secondary-fixed-dim": "#c8c6c5",
                      "background": "#fff8f4",
                      "surface": "#fff8f4",
                      "inverse-primary": "#ffb950",
                      "secondary-container": "#e2dfde",
                      "secondary": "#5f5e5e",
                      "amber-text": "#B47500",
                      "tertiary-fixed": "#cae6ff",
                      "on-secondary": "#ffffff",
                      "tertiary-fixed-dim": "#8ecdff",
                      "tertiary-container": "#309bdb",
                      "primary-fixed": "#ffddb3",
                      "surface-container-highest": "#ede0d3",
                      "text-mid": "#555555",
                      "error-container": "#ffdad6",
                      "inverse-on-surface": "#fcefe1",
                      "on-tertiary-container": "#002f49",
                      "primary-fixed-dim": "#ffb950",
                      "error": "#ba1a1a",
                      "on-error-container": "#93000a",
                      "surface-container-low": "#fff1e4",
                      "on-tertiary": "#ffffff",
                      "tertiary": "#006494",
                      "on-surface-variant": "#514535",
                      "text-light": "#888888",
                      "surface-dim": "#e5d8cb",
                      "on-primary-fixed-variant": "#633f00",
                      "on-error": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "section-dark": "#111111",
                      "page-bg": "#FAFAF8",
                      "on-secondary-container": "#636262",
                      "primary-container": "#c8860a",
                      "on-tertiary-fixed": "#001e30",
                      "primary": "#825500",
                      "inverse-surface": "#362f27",
                      "on-surface": "#211b13",
                      "on-primary": "#ffffff",
                      "on-tertiary-fixed-variant": "#004b70",
                      "surface-variant": "#ede0d3",
                      "on-secondary-fixed": "#1c1b1b",
                      "on-primary-container": "#3f2700",
                      "on-primary-fixed": "#291800",
                      "border-subtle": "#E8E4DC",
                      "section-amber": "rgba(200, 134, 10, 0.06)"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "space-48": "48px",
                      "space-128": "128px",
                      "space-64": "64px",
                      "gutter-wide": "32px",
                      "gutter-desktop": "24px",
                      "space-96": "96px",
                      "margin-mobile": "16px"
              },
              "fontFamily": {
                      "marketing-xl": ["Playfair Display"],
                      "ui-xs": ["Syne"],
                      "ui-sm": ["Syne"],
                      "ui-lg": ["Syne"],
                      "mono-md": ["DM Mono"],
                      "marketing-hero": ["Playfair Display"],
                      "ui-md": ["Syne"],
                      "mono-lg": ["DM Mono"],
                      "display-xl": ["Playfair Display"],
                      "display-lg": ["Playfair Display"]
              },
              "fontSize": {
                      "marketing-xl": ["48px", { "lineHeight": "1.15", "fontWeight": "400" }],
                      "ui-xs": ["12px", { "lineHeight": "1.5", "letterSpacing": "0.1em", "fontWeight": "500" }],
                      "ui-sm": ["14px", { "lineHeight": "1.6", "fontWeight": "400" }],
                      "ui-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "500" }],
                      "mono-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                      "marketing-hero": ["64px", { "lineHeight": "1.1", "fontWeight": "400" }],
                      "ui-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                      "mono-lg": ["18px", { "lineHeight": "1.4", "fontWeight": "400" }],
                      "display-xl": ["38px", { "lineHeight": "1.2", "fontWeight": "400" }],
                      "display-lg": ["26px", { "lineHeight": "1.3", "fontWeight": "400" }]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-page-bg text-on-background font-ui-sm min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed due to sub-page context 'New Journal Entry') -->
<header class="sticky top-0 flex justify-between items-center px-8 h-16 w-full backdrop-blur-md bg-page-bg z-40 border-b-[0.5px] border-border-subtle">
<div class="flex items-center gap-4">
<button class="text-on-background hover:text-primary-container transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-ui-lg text-on-background font-medium">New Journal Entry</h1>
</div>
<div class="flex items-center gap-4">
<button class="px-4 py-2 border-[0.5px] border-on-background text-on-background font-ui-sm hover:bg-section-muted transition-colors duration-200">Save Draft</button>
<button class="px-4 py-2 bg-primary-container text-on-primary font-ui-sm flex items-center gap-2 hover:bg-opacity-90 transition-all duration-200">
                Post Entry
                <span class="material-symbols-outlined text-sm transition-transform duration-200 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</header>
<main class="flex-grow p-8 max-w-[1200px] mx-auto w-full">
<!-- Entry Header Information -->
<section class="mb-8 grid grid-cols-4 gap-6 bg-surface-container-lowest p-6 border-[0.5px] border-border-subtle border-t-2 border-t-primary-container">
<div>
<label class="block font-ui-xs text-text-light mb-1 uppercase tracking-widest">Entry No.</label>
<div class="font-mono-md text-on-background">JE-2024-089</div>
</div>
<div>
<label class="block font-ui-xs text-text-light mb-1 uppercase tracking-widest">Date</label>
<input class="w-full bg-transparent border-b-[0.5px] border-border-subtle font-mono-md text-on-background focus:outline-none focus:border-primary-container pb-1" type="date" value="2024-05-15"/>
</div>
<div class="col-span-2">
<label class="block font-ui-xs text-text-light mb-1 uppercase tracking-widest">Description</label>
<input class="w-full bg-transparent border-b-[0.5px] border-border-subtle font-ui-sm text-on-background focus:outline-none focus:border-primary-container pb-1" type="text" value="Monthly Rent Allocation - May 2024"/>
</div>
</section>
<!-- Lines Table Area -->
<section class="bg-surface-container-lowest border-[0.5px] border-border-subtle flex flex-col h-[500px]">
<!-- Table Header -->
<div class="grid grid-cols-12 gap-4 p-4 border-b-[0.5px] border-border-subtle bg-section-muted font-ui-xs text-text-light uppercase tracking-widest">
<div class="col-span-4">Account</div>
<div class="col-span-4">Description</div>
<div class="col-span-2 text-right">Debit (INR)</div>
<div class="col-span-2 text-right">Credit (INR)</div>
</div>
<!-- Table Body (Scrollable) -->
<div class="flex-grow overflow-y-auto p-4 space-y-4">
<!-- Row 1 -->
<div class="grid grid-cols-12 gap-4 items-center group">
<div class="col-span-4">
<select class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-mono-md text-on-background focus:outline-none focus:border-primary-container">
<option>5100 - Rent Expense</option>
</select>
</div>
<div class="col-span-4">
<input class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-ui-sm text-on-background focus:outline-none focus:border-primary-container" type="text" value="Office Rent - Mumbai H.O."/>
</div>
<div class="col-span-2">
<input class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-mono-md text-on-background text-right focus:outline-none focus:border-primary-container" type="text" value="1,50,000.00"/>
</div>
<div class="col-span-2 relative">
<input class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-mono-md text-on-background text-right focus:outline-none focus:border-primary-container" type="text" value="0.00"/>
<button class="absolute -right-8 top-1/2 -translate-y-1/2 text-text-light hover:text-error opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Row 2 -->
<div class="grid grid-cols-12 gap-4 items-center group">
<div class="col-span-4">
<select class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-mono-md text-on-background focus:outline-none focus:border-primary-container">
<option>2100 - Accounts Payable</option>
</select>
</div>
<div class="col-span-4">
<input class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-ui-sm text-on-background focus:outline-none focus:border-primary-container" type="text" value="Workspace Providers LLP"/>
</div>
<div class="col-span-2">
<input class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-mono-md text-on-background text-right focus:outline-none focus:border-primary-container" type="text" value="0.00"/>
</div>
<div class="col-span-2 relative">
<input class="w-full bg-transparent border-[0.5px] border-border-subtle p-2 font-mono-md text-on-background text-right focus:outline-none focus:border-primary-container" type="text" value="1,50,000.00"/>
<button class="absolute -right-8 top-1/2 -translate-y-1/2 text-text-light hover:text-error opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Add Line Action -->
<button class="flex items-center gap-2 text-primary-container font-ui-sm hover:opacity-80 transition-opacity mt-4 py-2">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                    Add Line
                </button>
</div>
<!-- Balance Bar Component (Pinned to bottom of table) -->
<div class="bg-surface-container-high border-t-[0.5px] border-border-subtle grid grid-cols-3 divide-x-[0.5px] divide-border-subtle">
<!-- Total Debit Cell -->
<div class="p-4 flex justify-between items-center">
<span class="font-ui-xs text-text-mid uppercase tracking-widest">Total Debit</span>
<span class="font-mono-md text-on-background">₹1,50,000.00</span>
</div>
<!-- Total Credit Cell -->
<div class="p-4 flex justify-between items-center">
<span class="font-ui-xs text-text-mid uppercase tracking-widest">Total Credit</span>
<span class="font-mono-md text-on-background">₹1,50,000.00</span>
</div>
<!-- Difference Cell (Balanced State) -->
<div class="p-4 flex justify-between items-center bg-[#E6F4EA]/30"> <!-- Subtle green tint for balanced state -->
<span class="font-ui-xs text-[#1E8E3E] uppercase tracking-widest">Difference</span>
<div class="flex items-center gap-2">
<span class="font-mono-md text-[#1E8E3E]">₹0.00</span>
<span class="material-symbols-outlined text-[#1E8E3E] text-[18px]" data-icon="check_circle">check_circle</span>
</div>
</div>
</div>
</section>
</main>
</body></html>
