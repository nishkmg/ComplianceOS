<body class="bg-background text-on-background font-ui-sm flex items-center justify-center min-h-screen p-margin-mobile">
<!-- Modal Dialog -->
<div class="bg-surface-container-lowest border border-border-subtle shadow-sm w-full max-w-md p-6 relative">
<!-- Header -->
<div class="mb-6 flex items-start justify-between">
<div>
<h2 class="font-display-lg text-display-lg text-on-surface mb-1">Void Journal Entry</h2>
<p class="font-ui-sm text-ui-sm text-text-mid">Entry #JE-2023-0491</p>
</div>
<button class="text-text-light hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Warning Message -->
<div class="bg-error-container text-on-error-container p-4 mb-6 border border-error/20 flex gap-3">
<span class="material-symbols-outlined text-error shrink-0" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="font-ui-sm text-ui-sm">This action cannot be undone. Voiding this entry will reverse its financial impact across all associated ledgers.</p>
</div>
<!-- Form -->
<form>
<div class="mb-6">
<label class="block font-ui-xs text-ui-xs text-on-surface uppercase tracking-widest mb-2" for="reason">Reason for Voiding</label>
<textarea class="w-full bg-surface-container border border-border-subtle font-ui-sm text-ui-sm p-3 focus:outline-none focus:border-outline focus:ring-0 placeholder:text-text-light" id="reason" minlength="10" name="reason" placeholder="Enter a detailed reason (minimum 10 characters)..." required="" rows="4"></textarea>
<p class="font-ui-xs text-ui-xs text-text-light mt-1 text-right">0 / 10 min</p>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-4 mt-8">
<button class="font-ui-sm text-ui-sm text-text-mid hover:text-on-surface transition-colors px-4 py-2" type="button">
                    Cancel
                </button>
<button class="bg-error text-on-error font-ui-sm text-ui-sm px-6 py-2 border border-error hover:bg-on-error-container transition-colors flex items-center gap-2 group" type="submit">
                    Confirm Void
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
</div>
