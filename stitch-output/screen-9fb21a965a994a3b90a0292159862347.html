<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Account - ComplianceOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-container": "#309bdb",
                      "on-tertiary": "#ffffff",
                      "on-tertiary-container": "#002f49",

                      "on-surface": "#211b13",
                      "secondary-fixed-dim": "#c8c6c5",
                      "on-primary-container": "#3f2700",
                      "tertiary-fixed-dim": "#8ecdff",
                      "inverse-on-surface": "#fcefe1",
                      "on-tertiary-fixed": "#001e30",
                      "on-primary": "#ffffff",
                      "section-muted": "#F4F2EE",
                      "outline-variant": "#d6c4af",
                      "on-error": "#ffffff",
                      "section-amber": "rgba(200, 134, 10, 0.06)",
                      "error": "#ba1a1a",
                      "on-surface-variant": "#514535",
                      "surface-dim": "#e5d8cb",
                      "inverse-surface": "#362f27",
                      "on-error-container": "#93000a",
                      "surface-container": "#f9ecde",
                      "primary-container": "#c8860a",
                      "primary-fixed": "#ffddb3",
                      "on-secondary": "#ffffff",
                      "surface-container-high": "#f3e6d9",
                      "surface-container-lowest": "#ffffff",
                      "border-subtle": "#E8E4DC",
                      "text-mid": "#555555",
                      "on-background": "#211b13",
                      "primary-fixed-dim": "#ffb950",
                      "surface-tint": "#825500",
                      "secondary": "#5f5e5e",
                      "error-container": "#ffdad6",
                      "on-primary-fixed": "#291800",
                      "inverse-primary": "#ffb950",
                      "surface-container-highest": "#ede0d3",
                      "secondary-fixed": "#e5e2e1",
                      "secondary-container": "#e2dfde",
                      "section-dark": "#111111",
                      "on-secondary-fixed-variant": "#474746",
                      "background": "#fff8f4",
                      "tertiary-fixed": "#cae6ff",
                      "surface-variant": "#ede0d3",
                      "amber-text": "#B47500",
                      "tertiary": "#006494",
                      "on-secondary-fixed": "#1c1b1b",
                      "page-bg": "#FAFAF8",
                      "on-tertiary-fixed-variant": "#004b70",
                      "surface-bright": "#fff8f4",
                      "surface": "#fff8f4",
                      "primary": "#825500",
                      "on-primary-fixed-variant": "#633f00",
                      "on-secondary-container": "#636262",
                      "outline": "#847563"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "space-64": "64px",
                      "margin-mobile": "16px",
                      "space-48": "48px",
                      "space-96": "96px",
                      "space-128": "128px",
                      "gutter-wide": "32px",
                      "gutter-desktop": "24px"
              },
              "fontFamily": {
                      "display-xl": ["Playfair Display"],
                      "mono-lg": ["DM Mono"],

                      "marketing-hero": ["Playfair Display"],

                      "ui-xs": ["Syne"],

              },
              "fontSize": {

                      "mono-lg": ["18px", {"lineHeight": "1.4", "fontWeight": "400"}],
                      "ui-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "500"}],
                      "marketing-hero": ["64px", {"lineHeight": "1.1", "fontWeight": "400"}],
                      "ui-sm": ["14px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "ui-xs": ["12px", {"lineHeight": "1.5", "letterSpacing": "0.1em", "fontWeight": "500"}],
                      "mono-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "display-lg": ["26px", {"lineHeight": "1.3", "fontWeight": "400"}],
                      "ui-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "marketing-xl": ["48px", {"lineHeight": "1.15", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        /* Custom select styling for editorial look */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-page-bg text-on-background min-h-screen flex flex-col font-ui-md text-ui-md antialiased selection:bg-primary-container selection:text-white">
<!-- Task Header (Main Nav Suppressed per guidelines for transactional pages) -->
<header class="sticky top-0 z-50 bg-surface-container-lowest/90 backdrop-blur-md border-b-[0.5px] border-border-subtle px-8 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button aria-label="Cancel and return" class="text-text-mid hover:text-on-surface transition-colors flex items-center gap-2 group outline-none">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform duration-200">arrow_back</span>
<span class="font-ui-sm text-ui-sm font-medium">Cancel</span>
</button>
<div class="h-4 w-[0.5px] bg-border-subtle hidden md:block"></div>
<span class="font-ui-sm text-ui-sm text-text-light hidden md:block">Ledger Management</span>
</div>
<div class="flex items-center gap-3">
<button class="px-4 py-2 border-[0.5px] border-border-subtle text-on-surface font-ui-sm text-ui-sm rounded hover:bg-surface-variant transition-colors outline-none focus:ring-1 focus:ring-primary-container">
                Save Draft
            </button>
<button class="px-5 py-2 bg-primary-container text-on-primary font-ui-sm text-ui-sm rounded flex items-center gap-2 hover:bg-surface-tint transition-colors group outline-none focus:ring-2 focus:ring-offset-1 focus:ring-primary-container focus:ring-offset-page-bg">
                Create Account
                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-0.5 transition-transform duration-200">arrow_forward</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center py-space-64 px-margin-mobile md:px-gutter-desktop">
<!-- Form Container -->
<div class="w-full max-w-2xl bg-surface-container-lowest border-[0.5px] border-border-subtle rounded-sm">
<!-- Header Section -->
<div class="px-8 pt-10 pb-6 border-b-[0.5px] border-border-subtle relative">
<!-- Status Indicator Accent -->
<div class="absolute top-0 left-0 right-0 h-[2px] bg-primary-container rounded-t-sm"></div>
<h1 class="font-display-lg text-display-lg text-on-surface">New Account</h1>
<p class="font-ui-sm text-ui-sm text-text-mid mt-2 max-w-lg">Define the structural details for this ledger entry. Accuracy here ensures compliance continuity across fiscal reporting.</p>
</div>
<!-- Form Fields (High Density Layout) -->
<form class="p-8 space-y-6">
<!-- Row 1: Account Name -->
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface-variant mb-1.5 flex items-center gap-1" for="account-name">
                        Account Name <span aria-hidden="true" class="text-error">*</span>
</label>
<input class="w-full bg-surface border-[0.5px] border-outline-variant rounded px-3 py-2.5 font-ui-md text-ui-md text-on-surface placeholder:text-text-light focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="account-name" name="account-name" placeholder="e.g., Accounts Receivable - Domestic" required="" type="text"/>
</div>
<!-- Row 2: Code & Parent -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface-variant mb-1.5 flex items-center gap-1" for="account-code">
                            Account Code <span aria-hidden="true" class="text-error">*</span>
</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-text-light font-mono-md text-mono-md select-none">#</span>
<input class="w-full bg-surface border-[0.5px] border-outline-variant rounded pl-7 pr-3 py-2.5 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all tracking-tight" id="account-code" name="account-code" placeholder="1020-400" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface-variant mb-1.5" for="parent-account">
                            Parent Account
                        </label>
<div class="relative">
<input class="w-full bg-surface border-[0.5px] border-outline-variant rounded pl-3 pr-10 py-2.5 font-ui-md text-ui-md text-on-surface placeholder:text-text-light focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="parent-account" name="parent-account" placeholder="Search accounts..." type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-text-light pointer-events-none text-[20px]">search</span>
</div>
</div>
</div>
<div class="w-full h-[0.5px] bg-border-subtle my-2"></div>
<!-- Row 3: Types -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface-variant mb-1.5" for="account-type">
                            Account Type
                        </label>
<div class="relative">
<select class="w-full bg-surface border-[0.5px] border-outline-variant rounded pl-3 pr-10 py-2.5 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all cursor-pointer" id="account-type" name="account-type">
<option disabled="" selected="" value="">Select primary classification</option>
<option value="asset">Asset</option>
<option value="liability">Liability</option>
<option value="equity">Equity</option>
<option value="revenue">Revenue</option>
<option value="expense">Expense</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-text-light pointer-events-none text-[20px]">expand_more</span>
</div>
</div>
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface-variant mb-1.5" for="sub-type">
                            Sub-type
                        </label>
<div class="relative">
<select class="w-full bg-surface border-[0.5px] border-outline-variant rounded pl-3 pr-10 py-2.5 font-ui-md text-ui-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all cursor-pointer disabled:bg-surface-variant disabled:text-text-light disabled:cursor-not-allowed" id="sub-type" name="sub-type">
<option disabled="" selected="" value="">Select specific sub-type</option>
<option value="current_asset">Current Asset</option>
<option value="fixed_asset">Fixed Asset</option>
<option value="non_current_asset">Non-Current Asset</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-text-light pointer-events-none text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Row 4: Financials -->
<div>
<label class="block font-ui-sm text-ui-sm text-on-surface-variant mb-1.5" for="opening-balance">
                        Opening Balance <span class="text-text-light font-normal ml-1">(Optional)</span>
</label>
<div class="flex items-center">
<div class="bg-surface-variant border-[0.5px] border-r-0 border-outline-variant rounded-l px-4 py-2.5 flex items-center justify-center">
<span class="font-ui-sm text-ui-sm text-text-mid font-medium">INR</span>
</div>
<input class="flex-1 bg-surface border-[0.5px] border-outline-variant rounded-r px-3 py-2.5 font-mono-md text-mono-md text-on-surface placeholder:text-text-light focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all text-right" id="opening-balance" name="opening-balance" placeholder="0.00" type="text"/>
</div>
<p class="font-ui-xs text-ui-xs text-text-light mt-2">Balance will be recorded as of the current fiscal year start date.</p>
</div>
</form>
</div>
</main>
</body></html>
