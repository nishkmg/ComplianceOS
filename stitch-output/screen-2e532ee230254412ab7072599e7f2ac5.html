<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ComplianceOS - Discard Changes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            700: '#44403c',
                            800: '#292524',
                            900: '#1c1917',
                            950: '#0c0a09',
                        },
                        brand: {
                            gold: '#C8860A',
                            goldLight: '#E5A52A',
                            goldDark: '#9A6605',
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Public Sans", "sans-serif"],
                        "display": ["Public Sans", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-100 font-body antialiased text-stone-900 h-screen flex items-center justify-center">
<!-- Scrim / Overlay -->
<div class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Dialog Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="relative z-50 w-full max-w-sm mx-4 bg-[#F9F7F2] rounded border-[0.5px] border-stone-300 shadow-2xl overflow-hidden" role="dialog">
<!-- Top decorative border -->
<div class="h-1 w-full bg-brand-gold"></div>
<div class="p-6">
<!-- Icon & Title Row -->
<div class="flex items-start mb-4">
<div class="flex-shrink-0 mr-4">
<span class="material-symbols-outlined text-brand-gold text-3xl" style="font-variation-settings: 'FILL' 1;">
                        warning
                    </span>
</div>
<div>
<h3 class="text-lg font-bold text-stone-900 font-headline leading-tight" id="modal-title">
                        Discard unsaved changes?
                    </h3>
</div>
</div>
<!-- Content text -->
<div class="ml-12 mb-6">
<p class="text-sm text-stone-600 leading-relaxed font-body">
                    Any information you entered will be lost. This action cannot be undone.
                </p>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-end space-x-3 mt-4 pt-4 border-t-[0.5px] border-stone-200">
<button class="px-4 py-2 text-sm font-semibold text-stone-700 bg-transparent border border-stone-300 rounded hover:bg-stone-200 transition-colors duration-200 font-label focus:outline-none focus:ring-2 focus:ring-stone-400 focus:ring-offset-2 focus:ring-offset-[#F9F7F2]" type="button">
                    Discard Changes
                </button>
<button class="px-4 py-2 text-sm font-semibold text-[#F9F7F2] bg-[#C8860A] rounded hover:bg-[#9A6605] transition-colors duration-200 shadow-sm font-label focus:outline-none focus:ring-2 focus:ring-brand-gold focus:ring-offset-2 focus:ring-offset-[#F9F7F2]" type="button">
                    Keep Editing
                </button>
</div>
</div>
</div>
</body></html>
